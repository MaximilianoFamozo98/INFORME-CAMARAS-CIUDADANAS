<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Monitor de Cámaras</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

/* CONTENEDOR */
.container {
  max-width: 900px;
  margin: auto;
  padding: 30px;
  text-align: center;
}

/* TÍTULO */
h1 {
  margin-bottom: 20px;
}

/* TEXTAREA */
textarea {
  width: 100%;
  height: 150px;
  border-radius: 12px;
  padding: 15px;
  border: none;
  outline: none;
  resize: none;
  background: #1e293b;
  color: white;
}

/* BOTONES */
.buttons {
  margin-top: 15px;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-weight: bold;
  margin: 5px;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

.btn1 { background: #22c55e; }
.btn2 { background: #3b82f6; }

/* ESTADO */
#estado {
  margin-top: 15px;
  font-weight: bold;
}

/* PROGRESO */
#progress {
  width: 100%;
  height: 20px;
  background: #1e293b;
  margin-top: 20px;
  border-radius: 10px;
  overflow: hidden;
}

#bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #22c55e, #4ade80);
  transition: width 0.3s;
}

/* STATS */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-top: 20px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
}

.card span {
  font-size: 20px;
  font-weight: bold;
}

/* CONTADOR */
#contador, #porcentaje {
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>📡 Monitor de Cámaras</h1>

<textarea id="texto" placeholder="Pegá las cámaras acá..."></textarea>

<div class="buttons">
  <button class="btn1" onclick="analizarTexto()">Analizar Texto</button>
  <button class="btn2" onclick="analizarTodas()">Escanear Todas</button>
</div>

<p id="estado">Esperando acción...</p>

<div id="progress">
  <div id="bar"></div>
</div>

<p id="contador">0 / 0</p>
<p id="porcentaje">0%</p>

<div class="stats">
  <div class="card">🟢 Online<br><span id="online">0</span></div>
  <div class="card">🔴 Caídas<br><span id="sinRespuesta">0</span></div>
  <div class="card">⚪ IP vacía<br><span id="ipVacia">0</span></div>
  <div class="card">❌ No encontrada<br><span id="noEncontrada">0</span></div>
</div>

</div>

<script>
let intervalo;

function setEstado(txt) {
  document.getElementById("estado").innerText = txt;
}

function bloquearBotones(bloquear) {
  document.querySelectorAll("button").forEach(btn => {
    btn.disabled = bloquear;
    btn.style.opacity = bloquear ? "0.5" : "1";
  });
}

function iniciarProgreso() {
  clearInterval(intervalo);

  intervalo = setInterval(async () => {
    const res = await fetch("/progreso");
    const data = await res.json();

    const porcentaje = data.total
      ? (data.procesadas / data.total) * 100
      : 0;

    document.getElementById("bar").style.width = porcentaje + "%";
    document.getElementById("contador").innerText =
      `${data.procesadas} / ${data.total}`;

    document.getElementById("porcentaje").innerText =
      porcentaje.toFixed(0) + "%";

    document.getElementById("online").innerText = data.online || 0;
    document.getElementById("sinRespuesta").innerText = data.sinRespuesta || 0;
    document.getElementById("ipVacia").innerText = data.ipVacia || 0;
    document.getElementById("noEncontrada").innerText = data.noEncontrada || 0;

  }, 500);
}

function detenerProgreso() {
  clearInterval(intervalo);
  document.getElementById("bar").style.width = "100%";
}

// =============================

async function analizarTexto() {
  bloquearBotones(true);
  setEstado("🔄 Analizando cámaras...");
  iniciarProgreso();

  const texto = document.getElementById("texto").value;

  const res = await fetch("/analizar", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ texto }),
  });

  const blob = await res.blob();
  descargar(blob);

  detenerProgreso();
  bloquearBotones(false);
  setEstado("✅ Análisis terminado");
}

async function analizarTodas() {
  bloquearBotones(true);
  setEstado("🔄 Escaneando todas las cámaras...");
  iniciarProgreso();

  const res = await fetch("/analizar-todas");
  const blob = await res.blob();

  descargar(blob);

  detenerProgreso();
  bloquearBotones(false);
  setEstado("✅ Escaneo completo");
}

function descargar(blob) {
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement("a");

  const fecha = new Date().toISOString().slice(0,10);
  a.download = `reporte_${fecha}.xlsx`;

  a.href = url;
  a.click();
}
</script>

</body>
</html>
